name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    name: Unit - PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest

  laravel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 12
          - laravel: '12.*'
            php: '8.2'
          - laravel: '12.*'
            php: '8.3'
          - laravel: '12.*'
            php: '8.4'
          - laravel: '12.*'
            php: '8.5'
          # Laravel 13 (requires PHP 8.3+)
          - laravel: '13.*'
            php: '8.3'
          - laravel: '13.*'
            php: '8.4'
          - laravel: '13.*'
            php: '8.5'

    name: Laravel ${{ matrix.laravel }} - PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: portable-ascii

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring
          coverage: none

      - name: Install Laravel framework with dev dependencies
        run: |
          mkdir laravel-test && cd laravel-test
          composer init --name=test/laravel-integration --no-interaction
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config repositories.portable-ascii path ../portable-ascii
          composer require "laravel/framework:${{ matrix.laravel }}" "webpatser/portable-ascii:*@dev" "orchestra/testbench-core:*" "phpunit/phpunit:*" --prefer-source --no-interaction

      - name: Verify replacement
        run: |
          cd laravel-test
          if [ -d vendor/voku/portable-ascii ]; then
            echo "FAIL: voku/portable-ascii should be replaced, not installed"
            exit 1
          fi
          echo "OK: voku/portable-ascii correctly replaced"

      - name: Run Laravel Str/Stringable tests
        run: |
          cd laravel-test
          # Run only the test methods that exercise portable-ascii
          vendor/bin/phpunit \
            --filter="testStringAscii|testStringAsciiWithSpecificLocale|testSlug|testAsciiNull|testTransliterate|testTransliterateOverrideUnknown|testTransliterateStrict|testStringCanBeLimitedByWordsNonAscii" \
            vendor/laravel/framework/tests/Support/SupportStrTest.php \
            vendor/laravel/framework/tests/Support/SupportStringableTest.php

      - name: Run integration smoke test
        run: |
          cd laravel-test
          php ../portable-ascii/tests/integration.php
